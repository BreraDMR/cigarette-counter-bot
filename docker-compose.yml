services:
  cigarette-bot:
    build: .
    image: cigarette-counter-bot:latest
    container_name: cigarette-counter-bot
    restart: unless-stopped
    env_file: .env
    environment:
      # Часовой пояс для времени перекуров. Поменяй здесь, если переедешь.
      TZ: ${TZ:-Europe/Prague}
    volumes:
      - ./data:/data
